            <div id="placarB" class="pontos pontos-visitante">12</div>
        </div>

        <div id="area_quarter">

            <div id="setsB" class="volei sets sets-visitante">1</div>

        socket.on('atualizar_tela', (dados) => {
            console.log("Atualizar tela")

                const clockOffset = Date.now() - dados.serverTime;

        function changeCssSport(sport) {
            console.log("Definindo posições dos elementos via CSS")

            bola = document.getElementById('element-1')
            logo = document.getElementById('element-2')
            box = document.getElementById('box')
            pontoMandante = document.querySelector('.pontos-mandante');
            pontoVisitante = document.querySelector('.pontos-visitante');
            nomeMandante = document.querySelector('.nome-mandante');
            nomeVisitante = document.querySelector('.nome-visitante');
            
            tempo = document.querySelector('.tempo');
            periodo = document.querySelector('.periodo');

            logo.style.backgroundImage = "url('./base/" + sport + "/element-2.png')";
            bola.style.backgroundImage = "url('./base/" + sport + "/element-1.png')";
            box.style.backgroundImage = "url('./base/" + sport + "/box.png')";
            
            document.getElementById('area_sets').hidden = true;
            document.getElementById('area_quarter').hidden = true;
            document.getElementById('area_fault').hidden = true;

            if (sport == 'volei'){
                pontoMandante.style.top = "45.5%"
                pontoMandante.style.left = "40.5%"

                pontoVisitante.style.top = "45.5%"
                pontoVisitante.style.left = "59.2%"

                nomeMandante.style.top = "67%"
                nomeVisitante.style.top = "67%"
                
                tempo.style.top = "19%"
                tempo.style.left = "50%"
                tempo.innerText = "00:00"


                document.getElementById('area_sets').hidden = false;
            } else if (sport == 'basquete'){
                pontoMandante.style.top = "56.5%"
                pontoMandante.style.left = "40.5%"
                
                pontoVisitante.style.top = "56.5%"
                pontoVisitante.style.left = "59.2%"

                nomeVisitante.style.top = "80%"
                
                tempo.style.top = "30.3%"
                tempo.style.left = "37.3%"
                tempo.innerText = "00:00:00"

                document.getElementById('area_quarter').hidden = false;
            } else if (sport == 'futsal'){
                pontoMandante.style.top = "56.5%"
                pontoMandante.style.left = "40.5%"
                
                pontoVisitante.style.top = "56.5%"
                pontoVisitante.style.left = "59.2%"
