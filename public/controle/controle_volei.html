<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placar de Basquete</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fonte monoespaçada estilo placar digital */
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        .font-digital {
            font-family: 'Share Tech Mono', monospace;
        }
    </style>
</head>
<body class="bg-gray-900 text-white h-screen w-full flex flex-col overflow-hidden select-none">

    <div class="flex-1 flex flex-row p-4 md:p-8 gap-4">
        
        <div class="flex-1 bg-gray-800 rounded-3xl p-6 flex flex-col items-center justify-between border-4 border-blue-900 shadow-2xl">
            <h2 class="text-4xl md:text-5xl font-bold text-blue-400 tracking-widest uppercase">CASA</h2>
            
            <div class="bg-black w-full rounded-2xl py-8 flex justify-center items-center shadow-inner my-4">
                <span class="font-digital text-8xl md:text-[10rem] text-blue-500 leading-none" id="score-home">0</span>
            </div>

            <div class="grid grid-cols-3 gap-4 w-full mt-4">
                <button class="bg-blue-600 active:bg-blue-500 text-white text-3xl md:text-5xl font-bold py-6 rounded-xl shadow-lg transition transform active:scale-95">+1</button>
                <button class="bg-blue-600 active:bg-blue-500 text-white text-3xl md:text-5xl font-bold py-6 rounded-xl shadow-lg transition transform active:scale-95">+2</button>
                <button class="bg-blue-600 active:bg-blue-500 text-white text-3xl md:text-5xl font-bold py-6 rounded-xl shadow-lg transition transform active:scale-95">+3</button>
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-start p-4">
            <h2 class="text-3xl text-gray-400 font-bold mb-6 tracking-widest uppercase">Período 1</h2>
            
            <div class="bg-black px-8 py-6 rounded-3xl border-4 border-gray-700 shadow-2xl mb-8">
                <span class="font-digital text-7xl md:text-[8rem] text-yellow-500 leading-none" id="timer-display">10:00</span>
            </div>

            <div class="flex gap-4 mb-10 w-full justify-center">
                <button class="bg-green-600 active:bg-green-500 text-white font-bold text-2xl py-4 px-8 rounded-xl shadow-lg transition transform active:scale-95 flex-1 max-wxs">
                    ▶ PLAY
                </button>
                <button class="bg-yellow-600 active:bg-yellow-500 text-white font-bold text-2xl py-4 px-8 rounded-xl shadow-lg transition transform active:scale-95 flex-1 max-wxs">
                    ⏸ PAUSE
                </button>
            </div>

            <div class="bg-gray-800 p-6 rounded-2xl w-full max-w-sm flex flex-col items-center shadow-lg border border-gray-700">
                <label class="text-sm text-gray-400 font-bold uppercase mb-3">Ajustar Tempo (Min:Seg)</label>
                <div class="flex gap-2 items-center justify-center w-full">
                    <input type="number" min="0" max="99" value="10" class="w-20 bg-gray-900 text-white text-center text-2xl py-2 rounded-lg border border-gray-600 focus:outline-none focus:border-yellow-500 font-digital">
                    <span class="text-2xl font-bold">:</span>
                    <input type="number" min="0" max="59" value="00" class="w-20 bg-gray-900 text-white text-center text-2xl py-2 rounded-lg border border-gray-600 focus:outline-none focus:border-yellow-500 font-digital">
                </div>
                <button class="mt-4 bg-gray-600 active:bg-gray-500 text-white font-bold py-2 px-6 rounded-lg w-full transition transform active:scale-95">
                    Definir Novo Tempo
                </button>
            </div>
        </div>

        <div class="flex-1 bg-gray-800 rounded-3xl p-6 flex flex-col items-center justify-between border-4 border-red-900 shadow-2xl">
            <h2 class="text-4xl md:text-5xl font-bold text-red-400 tracking-widest uppercase">VISITANTE</h2>
            
            <div class="bg-black w-full rounded-2xl py-8 flex justify-center items-center shadow-inner my-4">
                <span class="font-digital text-8xl md:text-[10rem] text-red-500 leading-none" id="score-away">0</span>
            </div>

            <div class="grid grid-cols-3 gap-4 w-full mt-4">
                <button class="bg-red-600 active:bg-red-500 text-white text-3xl md:text-5xl font-bold py-6 rounded-xl shadow-lg transition transform active:scale-95">+1</button>
                <button class="bg-red-600 active:bg-red-500 text-white text-3xl md:text-5xl font-bold py-6 rounded-xl shadow-lg transition transform active:scale-95">+2</button>
                <button class="bg-red-600 active:bg-red-500 text-white text-3xl md:text-5xl font-bold py-6 rounded-xl shadow-lg transition transform active:scale-95">+3</button>
            </div>
        </div>

    </div>

</body>
</html>
