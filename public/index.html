        <div id="box" class="box"></div>

        <div id="element-1" class="element element-1"></div>

        <div id="logos">
            <div  class="logo logo-mandante flex items-center justify-center">
                <img id="logo-mandante" alt="Logo Mandante">
                <div id="sigla-mandante" class="hidden text-white font-bold text-5xl text-center w-full h-full flex items-center justify-center"></div>
            </div>
            <div class="logo logo-visitante flex items-center justify-center">
                <img id="logo-visitante" alt="Logo Visitante">
                <div id="sigla-visitante" class="hidden text-white font-bold text-5xl text-center w-full h-full flex items-center justify-center"></div>
            </div>
        </div>

        <div id="tempo" class="tempo"></div>

        <div id="nomes">
            <div id="nomeA" class="nome nome-mandante"></div>
            <div id="nomeB" class="nome nome-visitante"></div>
        </div>

        <div id="pontos">
            <div id="placarA" class="pontos pontos-mandante"></div>
            <div id="placarB" class="pontos pontos-visitante"></div>
        </div>

        <div id="area_quarter">
            <div class="quarter"></div>
            <div class="posse"></div>
        </div>

        <div id="area_fault">
            <div class="faltas-mandante"></div>
            <div class="periodo"></div>
            <div class="faltas-visitante"></div>
        </div>

        <div id="area_sets">
            <div id="setsA" class="volei sets sets-mandante"></div>
            <div id="setsT" class="volei sets sets-atual"></div>
            <div id="setsB" class="volei sets sets-visitante"></div>
        </div>

    </div>
<script src="/socket.io/socket.io.js"></script>

        // Lógica do Placar e Layout
        
        socket.on('atualizar_tela', (dados) => {
            console.log("Atualizar tela")
            if (dados.serverTime && dados.cronometro) {
                const clockOffset = Date.now() - dados.serverTime;
                dados.cronometro.inicioTimestamp += clockOffset;
            }

            changeCssSport(dados.esporte);
            estadoLocal = dados;
            console.log(dados);
            document.getElementById('nomeA').innerText = dados.timeA.nome;
            document.getElementById('nomeB').innerText = dados.timeB.nome;
            // document.getElementById('placarA').innerText = dados.timeA.placar;
            // document.getElementById('placarB').innerText = dados.timeB.placar;
            // document.getElementById('setsA').innerText = dados.timeA.sets;
            // document.getElementById('setsB').innerText = dados.timeB.sets;
            

            function getSigla(nome) {
                if (!nome) return "---";
                const palavras = nome.trim().split(/\s+/);
                if (palavras.length > 1) {
                    return palavras.slice(0, 3).map(p => p[0]).join('').toUpperCase();
                } else {
                    return nome.substring(0, 3).toUpperCase();
                }
            }

            if(dados.timeA.logo) { 
                document.getElementById('logo-mandante').src = dados.timeA.logo; 
                document.getElementById('logo-mandante').classList.remove('hidden'); 
                document.getElementById('sigla-mandante').classList.add('hidden');
            } else {
                document.getElementById('logo-mandante').classList.add('hidden');
                document.getElementById('sigla-mandante').innerText = getSigla(dados.timeA.nome);
                document.getElementById('sigla-mandante').classList.remove('hidden');
            }

            if(dados.timeB.logo) { 
                document.getElementById('logo-visitante').src = dados.timeB.logo; 
                document.getElementById('logo-visitante').classList.remove('hidden'); 
                document.getElementById('sigla-visitante').classList.add('hidden');
            } else {
                document.getElementById('logo-visitante').classList.add('hidden');
                document.getElementById('sigla-visitante').innerText = getSigla(dados.timeB.nome);
                document.getElementById('sigla-visitante').classList.remove('hidden');
            }

            // document.getElementById('saqueA').classList.add('hidden'); document.getElementById('saqueB').classList.add('hidden');
            // if(dados.esporte === 'volei') {

        function changeCssSport(sport) {
            console.log("Definindo posições dos elementos via CSS");

            // Elementos
            const bola = document.getElementById("element-1");
            const logo = document.getElementById("element-2");
            const box = document.getElementById("box");

            const pontoMandante = document.querySelector(".pontos-mandante");
            const pontoVisitante = document.querySelector(".pontos-visitante");
            const nomeMandante = document.querySelector(".nome-mandante");
            const nomeVisitante = document.querySelector(".nome-visitante");
            const logoMandante = document.querySelector(".logo-mandante");
            const logoVisitante = document.querySelector(".logo-visitante");

            const tempo = document.querySelector(".tempo");
            const periodo = document.querySelector(".periodo");

            const areaSets = document.getElementById("area_sets");
            const areaQuarter = document.getElementById("area_quarter");
            const areaFault = document.getElementById("area_fault");

            // Backgrounds
            logo.style.backgroundImage = `url('./base/${sport}/element-2.png')`;
            bola.style.backgroundImage = `url('./base/${sport}/element-1.png')`;
            box.style.backgroundImage = `url('./base/${sport}/box.png')`;

            // Esconde tudo primeiro
            areaSets.hidden = true;
            areaQuarter.hidden = true;
            areaFault.hidden = true;

            // Configurações por esporte
            const sportConfig = {
                volei: {
                    pontos: {
                        mandante: { top: "45.5%", left: "40.5%" },
                        visitante: { top: "45.5%", left: "59.2%" }
                    },
                    nomes: {
                        top: "67%"
                    },
                    tempo: {
                        top: "19%",
                        left: "50%",
                        text: "00:00"
                    },
                    logo: {
                        mandante: { top: "45.5%", left: "18.4%" },
                        visitante: { top: "45.5%", left: "81.7%" }
                    },
                    extraArea: areaSets,
                    elements: [1,2,3,4]
                },

                basquete: {
                    pontos: {
                        mandante: { top: "56.5%", left: "40.5%" },
                        visitante: { top: "56.5%", left: "59.2%" }
                    },
                    nomes: {
                        top: "80%"
                    },
                    tempo: {
                        top: "30.3%",
                        left: "37.3%",
                        text: "00:00:00"
                    },
                    logo: {
                        mandante: { top: "56.5%", left: "18.4%" },
                        visitante: { top: "56.5%", left: "81.7%" }
                    },
                    extraArea: areaFault,
                    elements: [1,2]
                },

                futsal: {
                    pontos: {
                        mandante: { top: "56.5%", left: "40.5%" },
                        visitante: { top: "56.5%", left: "59.2%" }
                    },
                    nomes: {
                        top: "80.5%"
                    },
                    tempo: {
                        top: "28%",
                        left: "44%",
                        text: "00:00"
                    },
                    logo: {
                        mandante: { top: "56.5%", left: "18.4%" },
                        visitante: { top: "56.5%", left: "81.7%" }
                    },
                    extraArea: areaFault,
                    elements: [1,2]
                }
            };

            const config = sportConfig[sport];

            if (!config) {
                console.warn(`Esporte "${sport}" não configurado.`);
                return;
            }



            // Pontos
            pontoMandante.style.top = config.pontos.mandante.top;
            pontoMandante.style.left = config.pontos.mandante.left;
            pontoMandante.innerHTML = "0"
            
            pontoVisitante.style.top = config.pontos.visitante.top;
            pontoVisitante.style.left = config.pontos.visitante.left;
            console.log("AAAA");
            pontoVisitante.innerHTML = "0"

            // Nomes
            nomeMandante.style.top = config.nomes.top;
            nomeVisitante.style.top = config.nomes.top;

            // Tempo
            tempo.style.top = config.tempo.top;
            tempo.style.left = config.tempo.left;
            tempo.innerText = config.tempo.text;

            // Área extra
            config.extraArea.hidden = false;
        }
