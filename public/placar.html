<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placar de Vôlei</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="placar-container">

        <div class="box"></div>

        <div class="element-1"></div>
        <div class="element-2"></div>
        
        <div class="logo logo-mandante">
            <img src="logo-time-a.png" alt="Logo Mandante">
        </div>
        <div class="logo logo-visitante">
            <img src="logo-time-b.png" alt="Logo Visitante">
        </div>

        <div class="tempo">00:00:00</div>

        <div class="nome nome-mandante">TIME MANDANTE</div>
        <div class="nome nome-visitante">TIME VISITANTE</div>

        <div class="pontos pontos-mandante">14</div>
        <div class="pontos pontos-visitante">12</div>

        <div class="volei sets sets-mandante">2</div>
        <div class="volei sets sets-atual">1</div>
        <div class="volei sets sets-visitante">1</div>

    </div>

</body>
</html>
